<!DOCTYPE html>
<html>
<head>
  <title>Call Simulator</title>
</head>
<body>

<h2>📞 Call Simulator</h2>
<button onclick="startCall()">Start Call</button>

<p id="status"></p>
<p><strong>You:</strong> <span id="userText"></span></p>
<p><strong>AI:</strong> <span id="aiText"></span></p>

<script>
async function startCall() {
  const recognition = new webkitSpeechRecognition();
  recognition.start();

  document.getElementById("status").innerText = "Listening...";

  recognition.onresult = async (event) => {
    const userSpeech = event.results[0][0].transcript;
    document.getElementById("userText").innerText = userSpeech;

    document.getElementById("status").innerText = "Thinking...";

    const response = await fetch("https://ai-chatbot--Philly499.replit.app", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message: userSpeech })
    });

    const data = await response.json();

    document.getElementById("aiText").innerText = data.reply;

    const speech = new SpeechSynthesisUtterance(data.reply);
    speechSynthesis.speak(speech);

    document.getElementById("status").innerText = "Done";
  };
}
</script>

</body>
</html>
